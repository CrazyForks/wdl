apiVersion: v1
kind: Service
metadata:
  name: s3mock
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: s3mock
spec:
  ports:
    - name: http
      port: 9090
      targetPort: http
  selector:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: s3mock
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3mock
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: s3mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wdl
      app.kubernetes.io/component: s3mock
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wdl
        app.kubernetes.io/component: s3mock
    spec:
      containers:
        - name: s3mock
          image: adobe/s3mock:4.7.0
          imagePullPolicy: IfNotPresent
          env:
            - name: initialBuckets
              value: wdl-assets,wdl-r2
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
          volumeMounts:
            - name: s3mock-data
              mountPath: /data
      volumes:
        - name: s3mock-data
          emptyDir: {}
