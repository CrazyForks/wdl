apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    app.kubernetes.io/name: wdl
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: gateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wdl
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-user-runtime-ingress
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: user-runtime
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wdl
      app.kubernetes.io/component: user-runtime
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wdl
              app.kubernetes.io/component: gateway
      ports:
        - port: 8081
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wdl
              app.kubernetes.io/component: system-runtime
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wdl
              app.kubernetes.io/component: scheduler
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wdl
              app.kubernetes.io/component: workflows
      ports:
        - port: 8088
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-system-runtime-ingress
