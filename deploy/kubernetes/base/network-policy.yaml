    app.kubernetes.io/component: system-runtime
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wdl
      app.kubernetes.io/component: system-runtime
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wdl
              app.kubernetes.io/component: gateway
      ports:
        - port: 8081
        - port: 8082
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wdl
              app.kubernetes.io/component: scheduler
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wdl
              app.kubernetes.io/component: workflows
      ports:
        - port: 8088
---
