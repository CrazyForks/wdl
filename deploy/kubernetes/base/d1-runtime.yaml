apiVersion: v1
kind: Service
metadata:
  name: d1-runtime
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: d1-runtime
spec:
  # First-hop router Service used by compiled workerd configs. Keep this
  # load-balanced; owner records use d1-runtime-headless instead.
  ports:
    - name: http
      port: 8787
      targetPort: http
  selector:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: d1-runtime
---
apiVersion: v1
kind: Service
metadata:
  name: d1-runtime-headless
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: d1-runtime
spec:
  # Owner endpoint Service. D1_TASK_ENDPOINT stores per-Pod names under this
  # Service so direct-owner traffic reaches the exact owning Pod.
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: 8787
      targetPort: http
  selector:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: d1-runtime
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: d1-runtime
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: d1-runtime
spec:
  replicas: 2
  serviceName: d1-runtime-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: wdl
      app.kubernetes.io/component: d1-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wdl
        app.kubernetes.io/component: d1-runtime
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: d1-runtime
          image: docker.io/getwdl/wdl-workerd:latest
          command: ["d1-supervisor"]
          envFrom:
            - configMapRef:
                name: wdl-config
            - secretRef:
                name: wdl-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: D1_TASK_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: D1_TASK_ENDPOINT
              # Stored in Redis owner records; do not point this at the
              # load-balanced d1-runtime Service.
              value: $(POD_NAME).d1-runtime-headless:8787
          ports:
            - name: http
              containerPort: 8787
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: d1-data
              mountPath: /data/d1
      volumes:
        - name: d1-data
          persistentVolumeClaim:
            claimName: d1-data
