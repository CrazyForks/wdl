apiVersion: v1
kind: Service
metadata:
  name: do-runtime
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: do-runtime
spec:
  # First-hop router Service used by compiled workerd configs. Keep this
  # load-balanced; owner records use do-runtime-headless instead.
  ports:
    - name: http
      port: 8788
      targetPort: http
  selector:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: do-runtime
---
apiVersion: v1
kind: Service
metadata:
  name: do-runtime-headless
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: do-runtime
spec:
  # Owner endpoint Service. DO_TASK_ENDPOINT stores per-Pod names under this
  # Service so direct-owner traffic reaches the exact owning Pod.
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: 8788
      targetPort: http
  selector:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: do-runtime
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: do-runtime
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: do-runtime
spec:
  replicas: 2
  serviceName: do-runtime-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: wdl
      app.kubernetes.io/component: do-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wdl
        app.kubernetes.io/component: do-runtime
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis-proxy
          image: docker.io/getwdl/wdl-rust:latest
          imagePullPolicy: Always
          command: ["/redis-proxy"]
          envFrom:
            - configMapRef:
                name: wdl-config
            - secretRef:
                name: wdl-secrets
          ports:
            - name: redis-proxy
              containerPort: 7070
          readinessProbe:
            exec:
              command: ["/redis-proxy", "healthcheck"]
          livenessProbe:
            exec:
              command: ["/redis-proxy", "healthcheck"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
        - name: do-runtime
          image: docker.io/getwdl/wdl-workerd:latest
          imagePullPolicy: Always
          command: ["do-supervisor"]
          envFrom:
            - configMapRef:
                name: wdl-config
            - secretRef:
                name: wdl-secrets
          env:
            - name: REDIS_PROXY_URL
              value: http://127.0.0.1:7070
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DO_TASK_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DO_TASK_ENDPOINT
              # Stored in Redis owner records; do not point this at the
              # load-balanced do-runtime Service.
              value: $(POD_NAME).do-runtime-headless:8788
          ports:
            - name: http
              containerPort: 8788
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: do-data
              mountPath: /data/do
      volumes:
        - name: do-data
          persistentVolumeClaim:
            claimName: do-data
