apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  template:
    spec:
      containers:
        - name: gateway
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-runtime
spec:
  template:
    spec:
      containers:
        - name: redis-proxy
          imagePullPolicy: Never
        - name: user-runtime
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-runtime
spec:
  template:
    spec:
      containers:
        - name: redis-proxy
          imagePullPolicy: Never
        - name: system-runtime
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: d1-runtime
spec:
  template:
    spec:
      containers:
        - name: d1-runtime
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: do-runtime
spec:
  template:
    spec:
      containers:
        - name: redis-proxy
          imagePullPolicy: Never
        - name: do-runtime
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
spec:
  template:
    spec:
      containers:
        - name: scheduler
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflows
spec:
  template:
    spec:
      containers:
        - name: workflows
          imagePullPolicy: Never
