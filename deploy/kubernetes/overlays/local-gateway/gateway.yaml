apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: wdl
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: public-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wdl-gateway
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: public-gateway
spec:
  parentRefs:
    - name: wdl
      sectionName: http
  hostnames:
    - admin.test
    - "*.workers.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gateway
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wdl-assets
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: assets-proxy
spec:
  parentRefs:
    - name: wdl
      sectionName: http
  hostnames:
    - s3mock.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /wdl-assets/assets
      backendRefs:
        - name: assets-proxy
          port: 8080
---
apiVersion: gateway.nginx.org/v1alpha1
kind: ProxySettingsPolicy
metadata:
  name: wdl-gateway-timeouts
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: public-gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: wdl-gateway
  timeout:
    read: 3600s
    send: 3600s
