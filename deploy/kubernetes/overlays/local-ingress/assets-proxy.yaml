apiVersion: v1
kind: ConfigMap
metadata:
  name: assets-proxy-config
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: assets-proxy
data:
  default.conf: |
    server {
      listen 8080;
      access_log /dev/stdout;
      error_log /dev/stderr notice;

      location / {
        return 404;
      }

      location = /healthz {
        return 204;
      }

      location ^~ /wdl-assets/assets/ {
        if ($args != "") {
          return 404;
        }

        limit_except GET {
          deny all;
        }

        proxy_pass http://s3mock:9090;
        proxy_set_header Host s3mock;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: assets-proxy
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: assets-proxy
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: assets-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assets-proxy
  labels:
    app.kubernetes.io/name: wdl
    app.kubernetes.io/component: assets-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wdl
      app.kubernetes.io/component: assets-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wdl
        app.kubernetes.io/component: assets-proxy
    spec:
      containers:
        - name: assets-proxy
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: assets-proxy-config
