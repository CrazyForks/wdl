                route_config:
                  name: system_runtime_loader
                  virtual_hosts:
                    - name: system_runtime_loader
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: system_runtime_loader }
                http_filters:
