        socket_address: { address: 0.0.0.0, port_value: 18088 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: user_runtime_internal
                preserve_external_request_id: true
                route_config:
                  name: user_runtime_internal
                  virtual_hosts:
                    - name: user_runtime_internal
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: user_runtime_internal }
                http_filters:
                  - name: envoy.filters.http.router
