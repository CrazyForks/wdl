  clusters:
    - name: user_runtime
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: user_runtime
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: user-runtime, port_value: 8081 }

    - name: system_runtime_loader
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: system_runtime_loader
        endpoints:
          - lb_endpoints:
